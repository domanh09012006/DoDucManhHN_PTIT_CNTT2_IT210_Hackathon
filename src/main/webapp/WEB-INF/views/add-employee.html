<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Thông tin nhân viên</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    </head>
    <body class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6 border p-4 shadow-sm">
                <h3 class="text-center" th:text="${action == 'add' ? 'THÊM NHÂN VIÊN MỚI' : 'CẬP NHẬT THÔNG TIN'}"></h3>
                <hr>
                <form th:action="@{/employees/save}" th:object="${employee}" method="post">
                    <div class="form-group">
                        <label>Mã nv:</label>
                        <input type="text" th:field="*{id}" class="form-control" th:readonly="${action == 'edit'}"  required>
                    </div>
                    <div class="form-group">
                        <label>Họ và tên:</label>
                        <input type="text" th:field="*{fullName}" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Chức vụ:</label>
                        <input type="text" th:field="*{position}" class="form-control"  required>
                    </div>
                    <div class="form-group">
                        <label>Mức lương:</label>
                        <input type="number" step="0.1" th:field="*{salary}" class="form-control"  required>
                    </div>
                    <div class="form-group">
                        <label>Link ảnh đại diện:</label>
                        <input type="text" th:field="*{avatar}" class="form-control" >
                    </div>
                    <hr>
                    <div class="text-center">
                        <button type="submit" class="btn btn-success px-4">Lưu lại</button>
                        <a th:href="@{/employees}" class="btn btn-secondary px-4">Quay lại</a>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
